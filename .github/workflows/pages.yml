name: Build and deploy G1 PRIME calibrated pages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source and G1 meshes
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Create the G1 calibration environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          environment-file: prime/g1_prime/environment.yml
          activate-environment: g1cal
          miniforge-version: latest
          auto-activate: false
      - name: Install the G1 calibration package
        shell: bash -el {0}
        working-directory: prime/g1_prime
        run: python -m pip install -e . --no-deps
      - name: Build calibrated G1 Meshcat pages
        shell: bash -el {0}
        working-directory: prime/g1_prime
        run: python scripts/publish_pages.py
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: prime/g1_prime/out/pages_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
